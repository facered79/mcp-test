<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캘린더</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #fff; color: #202124; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    button { cursor: pointer; font-family: inherit; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; height: 64px;
      padding: 0 16px; border-bottom: 1px solid #dadce0; gap: 8px; flex-shrink: 0;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; font-size: 1.35rem; color: #5f6368; margin-right: 8px; min-width: 155px; }
    .header-logo span { color: #1a73e8; font-weight: 500; }
    .btn-today { padding: 7px 16px; border: 1px solid #dadce0; border-radius: 4px; background: white; font-size: 0.875rem; color: #3c4043; }
    .btn-today:hover { background: #f1f3f4; }
    .btn-nav { width: 36px; height: 36px; border-radius: 50%; border: none; background: none; font-size: 1.2rem; color: #5f6368; display: flex; align-items: center; justify-content: center; }
    .btn-nav:hover { background: #f1f3f4; }
    .header-date-title { font-size: 1.35rem; color: #3c4043; font-weight: 400; min-width: 200px; }
    .header-spacer { flex: 1; }
    .view-switcher { display: flex; border: 1px solid #dadce0; border-radius: 4px; overflow: hidden; }
    .view-btn { padding: 7px 16px; border: none; background: white; font-size: 0.875rem; color: #3c4043; border-right: 1px solid #dadce0; }
    .view-btn:last-child { border-right: none; }
    .view-btn:hover { background: #f1f3f4; }
    .view-btn.active { background: #e8f0fe; color: #1a73e8; font-weight: 600; }

    /* ── App Body ── */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { width: 240px; flex-shrink: 0; padding: 12px 16px; border-right: 1px solid #dadce0; overflow-y: auto; }
    .btn-create { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: white; border: none; border-radius: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.14); font-size: 0.875rem; color: #3c4043; margin-bottom: 16px; width: 100%; font-weight: 500; }
    .btn-create:hover { box-shadow: 0 2px 6px rgba(0,0,0,.2); }
    .btn-create .plus { font-size: 1.4rem; line-height: 1; color: #1a73e8; }
    .mini-cal { margin-bottom: 16px; }
    .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .mini-cal-header h3 { font-size: 0.85rem; font-weight: 500; color: #3c4043; }
    .mini-nav { width: 28px; height: 28px; border-radius: 50%; border: none; background: none; font-size: 0.95rem; color: #5f6368; }
    .mini-nav:hover { background: #f1f3f4; }
    .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
    .mini-label { text-align: center; font-size: 0.68rem; color: #70757a; padding: 2px 0; }
    .mini-cell { text-align: center; font-size: 0.73rem; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; margin: auto; cursor: pointer; color: #3c4043; border-radius: 50%; }
    .mini-cell:hover { background: #f1f3f4; }
    .mini-cell.today { background: #1a73e8; color: white; font-weight: 700; }
    .mini-cell.selected:not(.today) { background: #e8f0fe; color: #1a73e8; font-weight: 700; }
    .mini-cell.other { color: #b0b3b5; }

    /* ── Main Content ── */
    .main-content { flex: 1; overflow: auto; display: flex; flex-direction: column; }

    /* ── Month View ── */
    .month-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .month-header-row { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid #dadce0; flex-shrink: 0; }
    .month-day-label { text-align: center; font-size: 0.73rem; color: #70757a; padding: 8px 0; font-weight: 500; }
    .month-grid { flex: 1; display: flex; flex-direction: column; }
    .month-week-row { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid #dadce0; flex: 1; min-height: 90px; }
    .month-week-row:last-child { border-bottom: none; }
    .month-cell { border-right: 1px solid #dadce0; padding: 4px; overflow: hidden; cursor: pointer; }
    .month-cell:last-child { border-right: none; }
    .month-cell:hover { background: #f8f9fa; }
    .day-number { font-size: 0.78rem; text-align: center; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 2px; font-weight: 400; }
    .day-number.today { background: #1a73e8; color: white !important; font-weight: 700; }
    .day-number.other { color: #b0b3b5; }
    .day-number.sunday { color: #d93025; }
    .day-number.saturday { color: #1967d2; }
    .event-pill { font-size: 0.71rem; padding: 1px 6px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; line-height: 1.7; }
    .event-pill:hover { filter: brightness(0.92); }
    .more-link { font-size: 0.71rem; color: #70757a; padding: 1px 4px; cursor: pointer; }
    .more-link:hover { background: #f1f3f4; border-radius: 3px; }

    /* ── Week View ── */
    .week-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .week-header { display: flex; border-bottom: 1px solid #dadce0; flex-shrink: 0; }
    .week-time-gutter { width: 56px; flex-shrink: 0; border-right: 1px solid transparent; }
    .week-day-headers { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); }
    .week-day-header { text-align: center; padding: 8px 0; border-right: 1px solid #dadce0; }
    .week-day-header:last-child { border-right: none; }
    .week-day-header .day-name { font-size: 0.72rem; color: #70757a; text-transform: uppercase; margin-bottom: 2px; }
    .week-day-header .day-num { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: auto; font-size: 1.2rem; cursor: pointer; }
    .week-day-header .day-num:hover { background: #f1f3f4; }
    .week-day-header .day-num.today { background: #1a73e8; color: white; font-weight: 700; }
    .week-body { flex: 1; overflow-y: auto; display: flex; }
    .week-time-col { width: 56px; flex-shrink: 0; }
    .week-time-label { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 8px; padding-top: 4px; font-size: 0.68rem; color: #70757a; }
    .week-grid { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); position: relative; }
    .week-col { border-right: 1px solid #dadce0; position: relative; height: 1440px; }
    .week-col:last-child { border-right: none; }
    .week-col-bg { position: absolute; inset: 0; z-index: 0; }
    .week-col-bg:hover { background: rgba(26,115,232,0.04); }
    .hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid #dadce0; pointer-events: none; }
    .half-line { position: absolute; left: 0; right: 0; border-top: 1px dashed #e8eaed; pointer-events: none; }
    .week-event { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 2px 5px; font-size: 0.71rem; overflow: hidden; cursor: pointer; z-index: 1; }
    .week-event:hover { filter: brightness(0.92); z-index: 3; }
    .week-event .ev-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .week-event .ev-time { opacity: 0.85; font-size: 0.68rem; }
    .now-line { position: absolute; left: 0; right: 0; border-top: 2px solid #d93025; z-index: 5; pointer-events: none; }
    .now-dot { position: absolute; left: -5px; top: -5px; width: 10px; height: 10px; border-radius: 50%; background: #d93025; }

    /* ── Day View ── */
    .day-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .day-header { border-bottom: 1px solid #dadce0; padding: 10px; text-align: center; flex-shrink: 0; }
    .day-header .day-name-big { font-size: 0.82rem; color: #70757a; text-transform: uppercase; }
    .day-header .day-num-big { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 4px auto; font-size: 2rem; font-weight: 300; color: #3c4043; }
    .day-header .day-num-big.today { background: #1a73e8; color: white; font-weight: 400; }
    .day-body { flex: 1; overflow-y: auto; display: flex; }
    .day-time-col { width: 56px; flex-shrink: 0; }
    .day-time-label { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 8px; padding-top: 4px; font-size: 0.68rem; color: #70757a; }
    .day-grid { flex: 1; position: relative; border-left: 1px solid #dadce0; height: 1440px; }
    .day-hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid #dadce0; pointer-events: none; }
    .day-half-line { position: absolute; left: 0; right: 0; border-top: 1px dashed #e8eaed; pointer-events: none; }
    .day-event { position: absolute; left: 8px; right: 8px; border-radius: 4px; padding: 4px 8px; font-size: 0.78rem; overflow: hidden; cursor: pointer; z-index: 1; }
    .day-event:hover { filter: brightness(0.92); z-index: 2; }
    .day-grid-bg { position: absolute; inset: 0; z-index: 0; }
    .day-grid-bg:hover { background: rgba(26,115,232,0.04); }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: white; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.22); width: 480px; max-width: 96vw; transform: scale(0.95); transition: transform .2s; }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-header { display: flex; align-items: center; padding: 16px 16px 0; gap: 8px; }
    .modal-title { flex: 1; font-size: 1rem; font-weight: 500; color: #3c4043; }
    .modal-close { width: 36px; height: 36px; border: none; background: none; border-radius: 50%; font-size: 1.1rem; color: #5f6368; }
    .modal-close:hover { background: #f1f3f4; }
    .modal-body { padding: 16px; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 0.77rem; color: #5f6368; margin-bottom: 4px; font-weight: 500; }
    .modal-field input, .modal-field textarea, .modal-field select { width: 100%; padding: 9px 12px; border: 1px solid #dadce0; border-radius: 4px; font-size: 0.875rem; color: #3c4043; font-family: inherit; outline: none; transition: border-color .15s; }
    .modal-field input:focus, .modal-field textarea:focus { border-color: #1a73e8; box-shadow: 0 0 0 1px #1a73e8; }
    .modal-field textarea { resize: vertical; min-height: 60px; }
    .time-row { display: flex; gap: 8px; align-items: center; }
    .time-row span { color: #5f6368; font-size: 0.85rem; }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .cp-opt { width: 28px; height: 28px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform .1s; }
    .cp-opt:hover { transform: scale(1.15); }
    .cp-opt.active { border-color: #202124; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 8px 16px 16px; }
    .btn-cancel { padding: 8px 20px; border: none; background: none; border-radius: 4px; font-size: 0.875rem; color: #1a73e8; font-weight: 500; }
    .btn-cancel:hover { background: #e8f0fe; }
    .btn-save { padding: 8px 20px; border: none; background: #1a73e8; color: white; border-radius: 4px; font-size: 0.875rem; font-weight: 500; }
    .btn-save:hover { background: #1765cc; }
    .btn-delete { padding: 8px 20px; border: none; background: none; border-radius: 4px; font-size: 0.875rem; color: #d93025; font-weight: 500; margin-right: auto; }
    .btn-delete:hover { background: #fce8e6; }

    /* ── Event Popup ── */
    .event-popup { position: fixed; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.22); width: 320px; z-index: 200; padding: 12px 16px 16px; display: none; }
    .event-popup.show { display: block; }
    .popup-header { display: flex; justify-content: flex-end; gap: 4px; margin-bottom: 10px; }
    .popup-btn { width: 32px; height: 32px; border: none; background: none; border-radius: 50%; font-size: 1rem; color: #5f6368; cursor: pointer; }
    .popup-btn:hover { background: #f1f3f4; }
    .popup-color-dot { width: 12px; height: 12px; border-radius: 2px; display: inline-block; margin-right: 8px; vertical-align: middle; }
    .popup-title { font-size: 1rem; font-weight: 500; color: #3c4043; margin-bottom: 8px; }
    .popup-meta { font-size: 0.82rem; color: #5f6368; line-height: 1.9; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(40px); background: #3c4043; color: white; padding: 10px 24px; border-radius: 4px; font-size: 0.875rem; opacity: 0; transition: all .25s; pointer-events: none; z-index: 999; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-logo">📅 <span>캘린더</span></div>
  <button class="btn-today" onclick="goToday()">오늘</button>
  <button class="btn-nav" onclick="navPrev()">&#8249;</button>
  <button class="btn-nav" onclick="navNext()">&#8250;</button>
  <div class="header-date-title" id="headerTitle"></div>
  <div class="header-spacer"></div>
  <div class="view-switcher">
    <button class="view-btn" id="vbDay" onclick="setView('day')">일</button>
    <button class="view-btn" id="vbWeek" onclick="setView('week')">주</button>
    <button class="view-btn active" id="vbMonth" onclick="setView('month')">월</button>
  </div>
</header>

<!-- App Body -->
<div class="app-body">
  <aside class="sidebar">
    <button class="btn-create" onclick="openCreateModal()">
      <span class="plus">+</span> 만들기
    </button>
    <div class="mini-cal">
      <div class="mini-cal-header">
        <button class="mini-nav" onclick="miniPrev()">&#8249;</button>
        <h3 id="miniTitle"></h3>
        <button class="mini-nav" onclick="miniNext()">&#8250;</button>
      </div>
      <div class="mini-grid" id="miniGrid"></div>
    </div>
  </aside>
  <main class="main-content" id="mainContent"></main>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">일정 만들기</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>제목 *</label>
        <input type="text" id="mTitle" placeholder="제목 추가" maxlength="40">
      </div>
      <div class="modal-field">
        <label>날짜 *</label>
        <input type="date" id="mDate">
      </div>
      <div class="modal-field">
        <label>시간</label>
        <div class="time-row">
          <input type="time" id="mStart" style="flex:1">
          <span>–</span>
          <input type="time" id="mEnd" style="flex:1">
        </div>
      </div>
      <div class="modal-field">
        <label>메모</label>
        <textarea id="mMemo" placeholder="메모 추가" rows="3"></textarea>
      </div>
      <div class="modal-field">
        <label>색상</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="modalDeleteBtn" onclick="deleteCurrentEvent()" style="display:none">삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- Event Detail Popup -->
<div class="event-popup" id="eventPopup">
  <div class="popup-header">
    <button class="popup-btn" onclick="editFromPopup()" title="수정">✏️</button>
    <button class="popup-btn" onclick="deleteFromPopup()" title="삭제">🗑️</button>
    <button class="popup-btn" onclick="closePopup()">✕</button>
  </div>
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-meta" id="popupMeta"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5000/api';

// ── State ──
const today = new Date();
let viewDate = new Date(today);
let view = 'month';
let events = [];
let miniDate = new Date(today);
let editingEventId = null;
let currentPopupEventId = null;
let selectedColor = '#1a73e8';

const COLORS = ['#1a73e8','#0f9d58','#d93025','#f9ab00','#9334e6','#e91e99','#00bcd4','#607d8b'];
const DAY_NAMES_KO = ['일','월','화','수','목','금','토'];
const DAY_NAMES_FULL = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

// ── Helpers ──
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtYM(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function todayStr() { return fmtDate(today); }
function parseTime(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function isLight(hex) {
  if (!hex || hex.length < 7) return false;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114)/1000 > 175;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── API ──
async function loadEvents() {
  try {
    if (view === 'month') {
      const res = await fetch(`${API}/events?month=${fmtYM(viewDate)}`);
      events = (await res.json()).events || [];
    } else if (view === 'week') {
      const ws = getWeekStart(viewDate);
      const we = new Date(ws); we.setDate(we.getDate()+6);
      const m1 = fmtYM(ws), m2 = fmtYM(we);
      if (m1 === m2) {
        const res = await fetch(`${API}/events?month=${m1}`);
        events = (await res.json()).events || [];
      } else {
        const [r1, r2] = await Promise.all([fetch(`${API}/events?month=${m1}`), fetch(`${API}/events?month=${m2}`)]);
        const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
        const ids = new Set();
        events = [...(d1.events||[]), ...(d2.events||[])].filter(e => !ids.has(e.id) && ids.add(e.id));
      }
    } else {
      const res = await fetch(`${API}/events?date=${fmtDate(viewDate)}`);
      events = (await res.json()).events || [];
    }
  } catch { events = []; showToast('⚠️ 서버에 연결할 수 없습니다'); }
}

// ── Navigation ──
function goToday() { viewDate = new Date(today); miniDate = new Date(today); renderAll(); }
function navPrev() {
  if (view==='month') viewDate.setMonth(viewDate.getMonth()-1);
  else if (view==='week') viewDate.setDate(viewDate.getDate()-7);
  else viewDate.setDate(viewDate.getDate()-1);
  renderAll();
}
function navNext() {
  if (view==='month') viewDate.setMonth(viewDate.getMonth()+1);
  else if (view==='week') viewDate.setDate(viewDate.getDate()+7);
  else viewDate.setDate(viewDate.getDate()+1);
  renderAll();
}
function setView(v) {
  view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('vb'+v[0].toUpperCase()+v.slice(1)).classList.add('active');
  renderAll();
}

// ── Render ──
async function renderAll() {
  closePopup();
  await loadEvents();
  updateHeader();
  renderMiniCal();
  renderMainView();
}

function updateHeader() {
  const el = document.getElementById('headerTitle');
  if (view==='month') { el.textContent = `${viewDate.getFullYear()}년 ${viewDate.getMonth()+1}월`; }
  else if (view==='week') {
    const ws = getWeekStart(viewDate);
    const we = new Date(ws); we.setDate(we.getDate()+6);
    el.textContent = ws.getMonth()===we.getMonth()
      ? `${ws.getFullYear()}년 ${ws.getMonth()+1}월`
      : `${ws.getFullYear()}년 ${ws.getMonth()+1}월 – ${we.getMonth()+1}월`;
  } else {
    el.textContent = `${viewDate.getFullYear()}년 ${viewDate.getMonth()+1}월 ${viewDate.getDate()}일`;
  }
}

// ── Mini Calendar ──
function renderMiniCal() {
  const y = miniDate.getFullYear(), m = miniDate.getMonth();
  document.getElementById('miniTitle').textContent = `${y}년 ${m+1}월`;
  const grid = document.getElementById('miniGrid');
  grid.innerHTML = '';
  DAY_NAMES_KO.forEach(d => {
    const el = document.createElement('div'); el.className='mini-label'; el.textContent=d; grid.appendChild(el);
  });
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();
  const tStr = todayStr(), selStr = fmtDate(viewDate);
  for (let i=firstDay-1;i>=0;i--) {
    const el=document.createElement('div'); el.className='mini-cell other'; el.textContent=prevDays-i; grid.appendChild(el);
  }
  for (let d=1;d<=daysInMonth;d++) {
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement('div'); el.className='mini-cell';
    if (ds===tStr) el.classList.add('today');
    else if (ds===selStr) el.classList.add('selected');
    el.textContent=d;
    el.addEventListener('click', ()=>{ viewDate=new Date(y,m,d); if(view!=='day') setView('day'); else renderAll(); });
    grid.appendChild(el);
  }
  const remain=(firstDay+daysInMonth)%7===0?0:7-(firstDay+daysInMonth)%7;
  for (let d=1;d<=remain;d++) {
    const el=document.createElement('div'); el.className='mini-cell other'; el.textContent=d; grid.appendChild(el);
  }
}
function miniPrev() { miniDate.setMonth(miniDate.getMonth()-1); renderMiniCal(); }
function miniNext() { miniDate.setMonth(miniDate.getMonth()+1); renderMiniCal(); }

function renderMainView() {
  if (view==='month') renderMonthView();
  else if (view==='week') renderWeekView();
  else renderDayView();
}

// ── Month View ──
function renderMonthView() {
  const main=document.getElementById('mainContent');
  const y=viewDate.getFullYear(), m=viewDate.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const tStr=todayStr();
  const rows=Math.ceil((firstDay+daysInMonth)/7);

  let html=`<div class="month-view"><div class="month-header-row">`;
  DAY_NAMES_KO.forEach(d=>html+=`<div class="month-day-label">${d}</div>`);
  html+=`</div><div class="month-grid">`;

  for (let row=0;row<rows;row++) {
    html+=`<div class="month-week-row">`;
    for (let col=0;col<7;col++) {
      const idx=row*7+col;
      let day, cy, cm, isOther=false;
      if (idx<firstDay) { day=prevDays-(firstDay-1-idx); cy=m===0?y-1:y; cm=m===0?11:m-1; isOther=true; }
      else if (idx>=firstDay+daysInMonth) { day=idx-firstDay-daysInMonth+1; cy=m===11?y+1:y; cm=m===11?0:m+1; isOther=true; }
      else { day=idx-firstDay+1; cy=y; cm=m; }
      const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dow=new Date(cy,cm,day).getDay();
      let numCls='day-number';
      if (ds===tStr) numCls+=' today';
      else if (isOther) numCls+=' other';
      else if (dow===0) numCls+=' sunday';
      else if (dow===6) numCls+=' saturday';

      const dayEvts=events.filter(e=>e.date===ds).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
      let evHtml='';
      dayEvts.slice(0,3).forEach(e=>{
        const bg=e.color||'#1a73e8', fg=isLight(bg)?'#000':'#fff';
        evHtml+=`<div class="event-pill" style="background:${bg};color:${fg}" onclick="showEventPopup(event,'${e.id}')">${escHtml(e.title)}</div>`;
      });
      if (dayEvts.length>3) evHtml+=`<div class="more-link" onclick="moreDay(event,'${ds}')">+${dayEvts.length-3}개 더보기</div>`;

      html+=`<div class="month-cell" onclick="cellClick(event,'${ds}')"><div class="${numCls}">${day}</div>${evHtml}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div></div>`;
  main.innerHTML=html;
}

function cellClick(e, ds) { if (e.target.closest('.event-pill')||e.target.closest('.more-link')) return; openCreateModal(ds); }
function moreDay(e, ds) { e.stopPropagation(); viewDate=new Date(ds); setView('day'); }

// ── Week View ──
function getWeekStart(d) { const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; }

function renderWeekView() {
  const main=document.getElementById('mainContent');
  const ws=getWeekStart(viewDate);
  const days=Array.from({length:7}, (_,i)=>{ const d=new Date(ws); d.setDate(d.getDate()+i); return d; });
  const tStr=todayStr();

  let html=`<div class="week-view"><div class="week-header"><div class="week-time-gutter"></div><div class="week-day-headers">`;
  days.forEach((d,i)=>{
    const ds=fmtDate(d), isToday=ds===tStr;
    html+=`<div class="week-day-header">
      <div class="day-name">${DAY_NAMES_KO[i]}</div>
      <div class="day-num${isToday?' today':''}" onclick="viewDate=new Date('${ds}');setView('day')">${d.getDate()}</div>
    </div>`;
  });
  html+=`</div></div><div class="week-body"><div class="week-time-col">`;
  for (let h=0;h<24;h++) html+=`<div class="week-time-label">${h===0?'':String(h).padStart(2,'0')+':00'}</div>`;
  html+=`</div><div class="week-grid">`;

  days.forEach((d,i)=>{
    const ds=fmtDate(d);
    const dayEvts=events.filter(e=>e.date===ds && e.start);
    html+=`<div class="week-col" id="wcol-${i}"><div class="week-col-bg" onclick="timeGridClick(event,'${ds}')"></div>`;
    for (let h=0;h<24;h++) {
      html+=`<div class="hour-line" style="top:${h*60}px"></div>`;
      html+=`<div class="half-line" style="top:${h*60+30}px"></div>`;
    }
    dayEvts.forEach(e=>{
      const s=parseTime(e.start), en=parseTime(e.end);
      const top=s, height=Math.max(en?en-s:60,22);
      const bg=e.color||'#1a73e8', fg=isLight(bg)?'#000':'#fff';
      html+=`<div class="week-event" style="background:${bg};color:${fg};top:${top}px;height:${height}px" onclick="showEventPopup(event,'${e.id}')">
        <div class="ev-title">${escHtml(e.title)}</div>
        <div class="ev-time">${e.start}${e.end?' – '+e.end:''}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div></div></div>`;
  main.innerHTML=html;

  // Current time line
  const nowMins=today.getHours()*60+today.getMinutes();
  days.forEach((d,i)=>{
    if (fmtDate(d)===tStr) {
      const col=document.getElementById(`wcol-${i}`);
      if (col) {
        col.insertAdjacentHTML('beforeend',`<div class="now-line" style="top:${nowMins}px"><div class="now-dot"></div></div>`);
        const body=main.querySelector('.week-body');
        if (body) body.scrollTop=Math.max(0,nowMins-180);
      }
    }
  });
}

// ── Day View ──
function renderDayView() {
  const main=document.getElementById('mainContent');
  const ds=fmtDate(viewDate), tStr=todayStr(), isToday=ds===tStr;
  const dow=viewDate.getDay();

  let html=`<div class="day-view">
    <div class="day-header">
      <div class="day-name-big">${DAY_NAMES_FULL[dow]}</div>
      <div class="day-num-big${isToday?' today':''}">${viewDate.getDate()}</div>
    </div>
    <div class="day-body">
      <div class="day-time-col">`;
  for (let h=0;h<24;h++) html+=`<div class="day-time-label">${h===0?'':String(h).padStart(2,'0')+':00'}</div>`;
  html+=`</div><div class="day-grid" id="dayGrid"><div class="day-grid-bg" onclick="timeGridClick(event,'${ds}')"></div>`;
  for (let h=0;h<24;h++) {
    html+=`<div class="day-hour-line" style="top:${h*60}px"></div>`;
    html+=`<div class="day-half-line" style="top:${h*60+30}px"></div>`;
  }
  events.filter(e=>e.date===ds && e.start).forEach(e=>{
    const s=parseTime(e.start), en=parseTime(e.end);
    const top=s, height=Math.max(en?en-s:60,30);
    const bg=e.color||'#1a73e8', fg=isLight(bg)?'#000':'#fff';
    html+=`<div class="day-event" style="background:${bg};color:${fg};top:${top}px;height:${height}px" onclick="showEventPopup(event,'${e.id}')">
      <div style="font-weight:600">${escHtml(e.title)}</div>
      <div style="font-size:0.7rem;opacity:0.85">${e.start}${e.end?' – '+e.end:''}</div>
      ${e.memo?`<div style="font-size:0.7rem;opacity:0.8;margin-top:2px">${escHtml(e.memo)}</div>`:''}
    </div>`;
  });
  html+=`</div></div></div>`;
  main.innerHTML=html;

  if (isToday) {
    const nowMins=today.getHours()*60+today.getMinutes();
    const grid=document.getElementById('dayGrid');
    if (grid) {
      grid.insertAdjacentHTML('beforeend',`<div class="now-line" style="top:${nowMins}px"><div class="now-dot"></div></div>`);
      const body=main.querySelector('.day-body');
      if (body) body.scrollTop=Math.max(0,nowMins-180);
    }
  }
}

function timeGridClick(e, ds) {
  if (e.target.closest('.week-event')||e.target.closest('.day-event')) return;
  const rect=e.currentTarget.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const h=Math.floor(y/60), m=Math.round((y%60)/15)*15;
  const ts=`${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  openCreateModal(ds, ts);
}

// ── Color Picker ──
function renderColorPicker() {
  document.getElementById('colorPicker').innerHTML=COLORS.map(c=>
    `<div class="cp-opt${c===selectedColor?' active':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c) { selectedColor=c; renderColorPicker(); }

// ── Modal ──
function openCreateModal(ds, ts) {
  editingEventId=null;
  document.getElementById('modalTitle').textContent='일정 만들기';
  document.getElementById('mTitle').value='';
  document.getElementById('mDate').value=ds||fmtDate(viewDate);
  document.getElementById('mStart').value=ts||'';
  document.getElementById('mEnd').value='';
  document.getElementById('mMemo').value='';
  document.getElementById('modalDeleteBtn').style.display='none';
  selectedColor='#1a73e8'; renderColorPicker();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mTitle').focus(),120);
}

function openEditModal(id) {
  const ev=events.find(e=>e.id===id); if (!ev) return;
  closePopup(); editingEventId=id;
  document.getElementById('modalTitle').textContent='일정 수정';
  document.getElementById('mTitle').value=ev.title;
  document.getElementById('mDate').value=ev.date;
  document.getElementById('mStart').value=ev.start||'';
  document.getElementById('mEnd').value=ev.end||'';
  document.getElementById('mMemo').value=ev.memo||'';
  document.getElementById('modalDeleteBtn').style.display='block';
  selectedColor=ev.color||'#1a73e8'; renderColorPicker();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalIfOutside(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

async function saveEvent() {
  const title=document.getElementById('mTitle').value.trim();
  if (!title) { showToast('제목을 입력해주세요'); return; }
  const date=document.getElementById('mDate').value;
  if (!date) { showToast('날짜를 선택해주세요'); return; }
  const payload={title, date, start:document.getElementById('mStart').value, end:document.getElementById('mEnd').value, memo:document.getElementById('mMemo').value.trim(), color:selectedColor};
  try {
    const res=await fetch(editingEventId?`${API}/events/${editingEventId}`:`${API}/events`, {
      method:editingEventId?'PUT':'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });
    const data=await res.json();
    if (data.success) { closeModal(); showToast(editingEventId?'✅ 수정되었습니다':'✅ 등록되었습니다'); renderAll(); }
    else showToast('❌ '+(data.error||'저장 실패'));
  } catch { showToast('❌ 서버 오류'); }
}

async function deleteCurrentEvent() {
  if (!editingEventId||!confirm('일정을 삭제할까요?')) return;
  try {
    const res=await fetch(`${API}/events/${editingEventId}`, {method:'DELETE'});
    if ((await res.json()).success) { closeModal(); showToast('🗑️ 삭제되었습니다'); renderAll(); }
  } catch { showToast('❌ 삭제 실패'); }
}

// ── Event Popup ──
function showEventPopup(e, id) {
  e.stopPropagation();
  const ev=events.find(ev=>ev.id===id); if (!ev) return;
  currentPopupEventId=id;
  const popup=document.getElementById('eventPopup');
  document.getElementById('popupTitle').innerHTML=`<span class="popup-color-dot" style="background:${ev.color||'#1a73e8'}"></span>${escHtml(ev.title)}`;
  let meta='📅 '+ev.date;
  if (ev.start) meta+=`<br>🕐 ${ev.start}${ev.end?' – '+ev.end:''}`;
  if (ev.memo) meta+=`<br>📝 ${escHtml(ev.memo)}`;
  document.getElementById('popupMeta').innerHTML=meta;
  const rect=e.target.getBoundingClientRect();
  popup.style.left=Math.min(rect.right+8, window.innerWidth-340)+'px';
  popup.style.top=Math.min(rect.top, window.innerHeight-220)+'px';
  popup.classList.add('show');
}
function closePopup() { document.getElementById('eventPopup').classList.remove('show'); currentPopupEventId=null; }
function editFromPopup() { if (currentPopupEventId) openEditModal(currentPopupEventId); }
async function deleteFromPopup() {
  if (!currentPopupEventId||!confirm('일정을 삭제할까요?')) return;
  const id=currentPopupEventId; closePopup();
  try {
    if ((await (await fetch(`${API}/events/${id}`, {method:'DELETE'})).json()).success) { showToast('🗑️ 삭제되었습니다'); renderAll(); }
  } catch { showToast('❌ 삭제 실패'); }
}

document.addEventListener('click', e=>{
  const popup=document.getElementById('eventPopup');
  if (popup.classList.contains('show') && !popup.contains(e.target) && !e.target.closest('.event-pill') && !e.target.closest('.week-event') && !e.target.closest('.day-event')) closePopup();
});
document.addEventListener('keydown', e=>{ if (e.key==='Escape') { closeModal(); closePopup(); } });

// ── Toast ──
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Init ──
renderAll();
</script>
</body>
</html>
